name: CD Production

# 이 워크플로는 main 브랜치 반영 결과를 GitOps 방식으로 운영에 승격합니다.
# 흐름은 "이미지 빌드/푸시 -> infra repo values 갱신 -> ArgoCD auto-sync" 순서입니다.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-service
            context: ./backend
            dockerfile: ./backend/gateway-service/Dockerfile
          - service: auth-service
            context: ./backend
            dockerfile: ./backend/auth-service/Dockerfile
          - service: team-service
            context: ./backend
            dockerfile: ./backend/team-service/Dockerfile
          - service: erd-service
            context: ./backend
            dockerfile: ./backend/erd-service/Dockerfile
          - service: collaboration
            context: ./collaboration
            dockerfile: ./collaboration/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            # 운영 진입은 ingress가 맡으므로 프론트 이미지는 정적 자산만 서빙하면 됩니다.
            build-args: |
              VITE_API_BASE_URL=
              VITE_COLLAB_URL=

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args || '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  promote-production:
    name: Promote Production Values
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-and-push

    environment:
      name: production

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Resolve Infra Repo Settings
        id: infra
        env:
          INFRA_REPO: ${{ vars.INFRA_REPO }}
          INFRA_REPO_REF: ${{ vars.INFRA_REPO_REF }}
          INFRA_VALUES_FILE: ${{ vars.INFRA_VALUES_FILE }}
        run: |
          : "${INFRA_REPO:?Set repository variable INFRA_REPO to the separate infra repository (owner/name).}"
          echo "repo=$INFRA_REPO" >> "$GITHUB_OUTPUT"
          echo "ref=${INFRA_REPO_REF:-main}" >> "$GITHUB_OUTPUT"
          echo "values_file=${INFRA_VALUES_FILE:-environments/prod/values.yaml}" >> "$GITHUB_OUTPUT"

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.infra.outputs.repo }}
          ref: ${{ steps.infra.outputs.ref }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Production Image Tag
        working-directory: infra-repo
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          INFRA_VALUES_FILE: ${{ steps.infra.outputs.values_file }}
        run: |
          : "${INFRA_VALUES_FILE:?Missing values file path.}"
          test -f "$INFRA_VALUES_FILE"

          if ! grep -qE '^  imageTag:' "$INFRA_VALUES_FILE"; then
            echo "expected global.imageTag key not found in $INFRA_VALUES_FILE"
            exit 1
          fi

          sed -i.bak -E "s#^(  imageTag: ).*#\\1${IMAGE_TAG}#" "$INFRA_VALUES_FILE"
          rm -f "${INFRA_VALUES_FILE}.bak"
          grep -nE '^global:|^  imageTag:' "$INFRA_VALUES_FILE"

      - name: Commit Promotion
        working-directory: infra-repo
        env:
          INFRA_VALUES_FILE: ${{ steps.infra.outputs.values_file }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: |
          if git diff --quiet -- "$INFRA_VALUES_FILE"; then
            echo "promotion file already points to ${SOURCE_SHA}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$INFRA_VALUES_FILE"
          git commit -m "chore(prod): promote ${SOURCE_REPOSITORY}@${SOURCE_SHA}"

      - name: Push Promotion Commit
        working-directory: infra-repo
        run: git push origin HEAD:${{ steps.infra.outputs.ref }}

      - name: Print Promotion Summary
        run: |
          echo "promotion commit pushed"
          echo "infra repo: ${{ steps.infra.outputs.repo }}"
          echo "infra ref: ${{ steps.infra.outputs.ref }}"
          echo "이미지 태그: ${{ env.IMAGE_TAG }}"
