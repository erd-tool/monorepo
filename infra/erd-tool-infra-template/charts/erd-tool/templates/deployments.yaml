apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "frontend") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      containers:
        - name: frontend
          image: {{ include "erd-tool.appImage" (list . "frontend") | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "gateway-service") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "gateway-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "gateway-service") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      containers:
        - name: gateway-service
          image: {{ include "erd-tool.appImage" (list . "gateway-service") | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: TEAM_SERVICE_URL
              value: http://team-service:8082
            - name: ERD_SERVICE_URL
              value: http://erd-service:8083
            - name: COLLAB_SERVICE_URL
              value: ws://collaboration:1234
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.jwtSecretName }}
                  key: JWT_SECRET
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
          {{- with .Values.gateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "auth-service") | nindent 4 }}
spec:
  replicas: {{ .Values.auth.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "auth-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "auth-service") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      volumes:
        - name: db-config
          secret:
            secretName: {{ .Values.global.dbSecretName }}
            items:
              - key: db.yml
                path: db.yml
      containers:
        - name: auth-service
          image: {{ include "erd-tool.appImage" (list . "auth-service") | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:file:/config/db.yml
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.jwtSecretName }}
                  key: JWT_SECRET
          ports:
            - name: http
              containerPort: 8081
          volumeMounts:
            - name: db-config
              mountPath: {{ .Values.global.dbConfigMountPath }}
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
          {{- with .Values.auth.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
