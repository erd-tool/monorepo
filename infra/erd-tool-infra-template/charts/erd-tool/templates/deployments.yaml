apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "logstash") | nindent 4 }}
spec:
  replicas: {{ .Values.logstash.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "logstash") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "logstash") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      volumes:
        - name: logstash-pipeline
          configMap:
            name: logstash-pipeline
      containers:
        - name: logstash
          image: {{ .Values.logstash.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: LS_JAVA_OPTS
              value: -Xms256m -Xmx256m
          ports:
            - name: http
              containerPort: {{ .Values.logstash.httpPort }}
          volumeMounts:
            - name: logstash-pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          {{- with .Values.logstash.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "prometheus") | nindent 4 }}
spec:
  replicas: {{ .Values.prometheus.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "prometheus") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: http
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
          {{- with .Values.prometheus.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "grafana") | nindent 4 }}
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "grafana") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.grafanaAdminSecretName }}
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.grafanaAdminSecretName }}
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: {{ printf "%s%s" (include "erd-tool.externalOrigin" .) .Values.grafana.subPath | quote }}
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
          {{- with .Values.grafana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "kibana") | nindent 4 }}
spec:
  replicas: {{ .Values.kibana.replicas }}
  selector:
    matchLabels:
      {{- include "erd-tool.componentSelectorLabels" (list . "kibana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erd-tool.componentSelectorLabels" (list . "kibana") | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      containers:
        - name: kibana
          image: {{ .Values.kibana.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
            - name: SERVER_BASEPATH
              value: {{ .Values.kibana.subPath | quote }}
            - name: SERVER_REWRITEBASEPATH
              value: "true"
            - name: SERVER_PUBLICBASEURL
              value: {{ printf "%s%s" (include "erd-tool.externalOrigin" .) .Values.kibana.subPath | quote }}
            - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.kibanaSecretName }}
                  key: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
          ports:
            - name: http
              containerPort: 5601
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          {{- with .Values.kibana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
