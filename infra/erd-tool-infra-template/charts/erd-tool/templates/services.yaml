apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "erd-tool.componentLabels" (list . "frontend") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "erd-tool.componentSelectorLabels" (list . "frontend") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
---
