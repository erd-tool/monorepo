# 운영 배포용 compose 파일입니다.
# 레지스트리에서 미리 빌드된 이미지를 내려받아 사용하며, 데이터베이스는 이 스택 외부에 있다고 가정합니다.
services:
  # 협업 서비스에서 사용하는 공용 캐시 및 pub/sub 용도입니다.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # 외부 클라이언트가 접근하는 공개 API 게이트웨이입니다.
  gateway-service:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/gateway-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TEAM_SERVICE_URL: http://team-service:8082
      ERD_SERVICE_URL: http://erd-service:8083
      COLLAB_SERVICE_URL: ws://collaboration:1234
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    depends_on:
      auth-service:
        condition: service_healthy
      team-service:
        condition: service_healthy
      erd-service:
        condition: service_healthy
      collaboration:
        condition: service_healthy
      logstash:
        condition: service_started
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "gateway-service"

  # 마운트된 db.yml 파일에서 데이터소스 설정을 읽는 인증 서비스입니다.
  auth-service:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/auth-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    volumes:
      - ${DB_CONFIG_DIR:-/opt/erd/config}:/config:ro
    depends_on:
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "auth-service"

  # 팀 및 초대 관리 서비스입니다.
  team-service:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/team-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      AUTH_SERVICE_URL: http://auth-service:8081
      ERD_SERVICE_URL: http://erd-service:8083
    volumes:
      - ${DB_CONFIG_DIR:-/opt/erd/config}:/config:ro
    depends_on:
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "team-service"

  # ERD CRUD, 내보내기, 공개 조회를 담당하는 서비스입니다.
  erd-service:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/erd-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      TEAM_SERVICE_URL: http://team-service:8082
    volumes:
      - ${DB_CONFIG_DIR:-/opt/erd/config}:/config:ro
    depends_on:
      team-service:
        condition: service_started
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "erd-service"

  # Yjs/WebSocket 기반 실시간 협업 서버입니다.
  collaboration:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/collaboration:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ERD_SERVICE_URL: http://erd-service:8083
    expose:
      - "1234"
    depends_on:
      redis:
        condition: service_started
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "collaboration"

  # 게이트웨이로 리버스 프록시되는 Nginx 기반 프론트엔드입니다.
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_REPOSITORY:-erd-tool/monorepo}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_started
      collaboration:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    logging:
      driver: gelf
      options:
        gelf-address: "${GELF_ADDRESS:-udp://127.0.0.1:12201}"
        tag: "frontend"

  # 구조화 로그 수집 및 검색을 위한 ELK 스택입니다.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  # 애플리케이션 로그를 수집하고 Elasticsearch로 전달합니다.
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    restart: unless-stopped
    ports:
      - "12201:12201/udp"
      - "5000:5000/tcp"
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./ops/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_started

  # 수집된 로그를 조회하고 분석하는 Kibana입니다.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    depends_on:
      elasticsearch:
        condition: service_started

  # 서비스 메트릭 수집 및 대시보드를 위한 모니터링 스택입니다.
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      gateway-service:
        condition: service_started
      auth-service:
        condition: service_started
      team-service:
        condition: service_started
      erd-service:
        condition: service_started
      collaboration:
        condition: service_started

  # Prometheus 데이터를 시각화하는 Grafana입니다.
  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  redis-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
