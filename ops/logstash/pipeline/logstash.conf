input {
  gelf {
    port => 12201
    codec => plain { charset => "UTF-8" }
  }

  tcp {
    port => 5000
    codec => json_lines
    tags => ["json-direct"]
  }
}

filter {
  if [message] and [message] =~ "^\s*\{" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  if [short_message] and [short_message] =~ "^\s*\{" {
    json {
      source => "short_message"
      target => "parsed_json"
      skip_on_invalid_json => true
    }

    if [parsed_json] {
      mutate {
        rename => { "[parsed_json][timestamp]" => "timestamp" }
        rename => { "[parsed_json][level]" => "level" }
        rename => { "[parsed_json][service]" => "service" }
        rename => { "[parsed_json][traceId]" => "traceId" }
        rename => { "[parsed_json][requestId]" => "requestId" }
        rename => { "[parsed_json][userId]" => "userId" }
        rename => { "[parsed_json][logger]" => "logger" }
        rename => { "[parsed_json][message]" => "applicationMessage" }
        rename => { "[parsed_json][exception]" => "exception" }
      }
    }
  }

  if ![service] and [container_name] {
    mutate {
      add_field => { "service" => "%{container_name}" }
    }
  }

  if ![service] and [tag] {
    mutate {
      add_field => { "service" => "%{tag}" }
    }
  }

  mutate {
    rename => { "short_message" => "message" }
  }

  if [applicationMessage] {
    mutate {
      replace => { "message" => "%{applicationMessage}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "erdtool-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
