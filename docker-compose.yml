# 로컬 개발 및 전체 스택 검증용 compose 파일입니다.
# 현재 워크스페이스에서 이미지를 직접 빌드하며, 내부 PostgreSQL 컨테이너를 포함합니다.
services:
  # 개발 및 스모크 테스트용 로컬 PostgreSQL입니다.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erdtool}
      POSTGRES_USER: ${POSTGRES_USER:-erdtool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erdtool}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erdtool"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 백엔드 마이크로서비스 앞단의 공개 API 게이트웨이입니다.
  gateway-service:
    build:
      context: ./backend
      dockerfile: gateway-service/Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TEAM_SERVICE_URL: http://team-service:8082
      ERD_SERVICE_URL: http://erd-service:8083
      COLLAB_SERVICE_URL: ws://collaboration:1234
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    depends_on:
      auth-service:
        condition: service_healthy
      team-service:
        condition: service_healthy
      erd-service:
        condition: service_healthy
      collaboration:
        condition: service_healthy
      logstash:
        condition: service_started
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "gateway-service"

  # 마운트된 db.yml 설정을 읽는 인증 서비스입니다.
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "auth-service"

  # 팀 및 초대 관리 서비스입니다.
  team-service:
    build:
      context: ./backend
      dockerfile: team-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      AUTH_SERVICE_URL: http://auth-service:8081
      ERD_SERVICE_URL: http://erd-service:8083
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "team-service"

  # ERD CRUD, 내보내기, 공개 조회를 담당하는 서비스입니다.
  erd-service:
    build:
      context: ./backend
      dockerfile: erd-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      TEAM_SERVICE_URL: http://team-service:8082
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      team-service:
        condition: service_started
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "erd-service"

  # Yjs/WebSocket 기반 실시간 협업 서버입니다.
  collaboration:
    build:
      context: ./collaboration
    environment:
      ERD_SERVICE_URL: http://erd-service:8083
    expose:
      - "1234"
    depends_on:
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "collaboration"

  # 게이트웨이로 리버스 프록시되는 Nginx 기반 프론트엔드입니다.
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_COLLAB_URL: ""
    depends_on:
      gateway-service:
        condition: service_started
      collaboration:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

  # 구조화 로그 수집 및 검색을 위한 ELK 스택입니다.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  # 애플리케이션 로그를 수집하고 Elasticsearch로 전달합니다.
  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "12201:12201/udp"
      - "5000:5000/tcp"
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./ops/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_started

  # 수집된 로그를 조회하고 분석하는 Kibana입니다.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "${KIBANA_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}"
    depends_on:
      elasticsearch:
        condition: service_started

  # 서비스 메트릭 수집 및 대시보드를 위한 모니터링 스택입니다.
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      gateway-service:
        condition: service_started
      auth-service:
        condition: service_started
      team-service:
        condition: service_started
      erd-service:
        condition: service_started
      collaboration:
        condition: service_started

  # Prometheus 데이터를 시각화하는 Grafana입니다.
  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
