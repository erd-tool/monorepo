services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erdtool}
      POSTGRES_USER: ${POSTGRES_USER:-erdtool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erdtool}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erdtool"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway-service:
    build:
      context: ./backend
      dockerfile: gateway-service/Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TEAM_SERVICE_URL: http://team-service:8082
      ERD_SERVICE_URL: http://erd-service:8083
      COLLAB_SERVICE_URL: ws://collaboration:1234
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    depends_on:
      auth-service:
        condition: service_healthy
      team-service:
        condition: service_healthy
      erd-service:
        condition: service_healthy
      collaboration:
        condition: service_healthy
      logstash:
        condition: service_started
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "gateway-service"

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "auth-service"

  team-service:
    build:
      context: ./backend
      dockerfile: team-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      AUTH_SERVICE_URL: http://auth-service:8081
      ERD_SERVICE_URL: http://erd-service:8083
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "team-service"

  erd-service:
    build:
      context: ./backend
      dockerfile: erd-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:file:/config/db.yml
      TEAM_SERVICE_URL: http://team-service:8082
    volumes:
      - ${DB_CONFIG_DIR:-./ops/config}:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      team-service:
        condition: service_started
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "erd-service"

  collaboration:
    build:
      context: ./collaboration
    environment:
      ERD_SERVICE_URL: http://erd-service:8083
    expose:
      - "1234"
    depends_on:
      redis:
        condition: service_started
      logstash:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "collaboration"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_COLLAB_URL: ""
    depends_on:
      gateway-service:
        condition: service_started
      collaboration:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "12201:12201/udp"
      - "5000:5000/tcp"
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - ./ops/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_started

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "${KIBANA_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}"
    depends_on:
      elasticsearch:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      gateway-service:
        condition: service_started
      auth-service:
        condition: service_started
      team-service:
        condition: service_started
      erd-service:
        condition: service_started
      collaboration:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
