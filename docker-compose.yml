services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erdtool}
      POSTGRES_USER: ${POSTGRES_USER:-erdtool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erdtool}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/erdtool}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-erdtool}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-erdtool}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-for-production}
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  collaboration:
    build:
      context: ./collaboration
    depends_on:
      - redis
    ports:
      - "${COLLAB_PORT:-1234}:1234"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_COLLAB_URL: ${VITE_COLLAB_URL:-ws://localhost:1234}
    depends_on:
      - backend
      - collaboration
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres-data:
