server:
  port: 8083

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erdtool_erd}
    username: ${SPRING_DATASOURCE_USERNAME:erdtool}
    password: ${SPRING_DATASOURCE_PASSWORD:erdtool}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: erd
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

services:
  team-service:
    url: ${TEAM_SERVICE_URL:http://localhost:8082}
