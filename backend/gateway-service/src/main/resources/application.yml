server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            websocket:
              max-frame-payload-length: 2097152
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
            allowCredentials: false
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: team-service
          uri: ${TEAM_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/teams/**
        - id: erd-service
          uri: ${ERD_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/erds/**
        - id: public-erd-service
          uri: ${ERD_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/public/erds/**
        - id: collaboration-service
          uri: ${COLLAB_SERVICE_URL:ws://localhost:1234}
          predicates:
            - Path=/ws/collaboration/**
          filters:
            - StripPrefix=2
        - id: health
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/healthz

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-for-production}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: API gateway for ERD Cloud services
    version: 0.0.1-SNAPSHOT
