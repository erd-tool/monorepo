server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erdtool_auth}
    username: ${SPRING_DATASOURCE_USERNAME:erdtool}
    password: ${SPRING_DATASOURCE_PASSWORD:erdtool}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: auth
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  hateoas:
    use-hal-as-default-json-media-type: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Public authentication API for ERD Cloud
    version: 0.0.1-SNAPSHOT

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-for-production}
    access-token-expiration-seconds: 86400
