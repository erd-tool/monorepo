server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erdtool_auth}
    username: ${SPRING_DATASOURCE_USERNAME:erdtool}
    password: ${SPRING_DATASOURCE_PASSWORD:erdtool}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: auth
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-for-production}
    access-token-expiration-seconds: 86400
